<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kwai AI</title>

  <style>
    body {
      margin: 0;
      font-family: 'Tajawal', sans-serif;
      background: #0d0d0f;
      color: #fff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* الشريط الجانبي */
    .sidebar {
      width: 240px;
      background: #111113;
      border-left: 1px solid #222;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar h2 {
      margin: 0;
      font-size: 22px;
      color: #38bdf8;
      text-align: center;
    }

    .sidebar button {
      background: #1a1a1c;
      color: #e5e7eb;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      text-align: center;
      transition: 0.2s;
    }

    .sidebar button:hover {
      border-color: #38bdf8;
      color: #38bdf8;
    }

    /* منطقة المحادثة */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 40px;
    }

    .message {
      background: #1a1a1c;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      max-width: 80%;
      font-size: 15px;
      line-height: 1.6;
    }

    /* رسالة المستخدم */
    .user {
      background: #0f172a;
      margin-left: auto;
      border-right: 4px solid #38bdf8;
    }

    /* رسالة الذكاء الاصطناعي */
    .ai {
      background: #1a1a1c;
      border-left: 4px solid #38bdf8;
    }

    /* صندوق الإدخال */
    .input-box {
      padding: 15px 20px;
      background: #111113;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
    }

    .input-box input {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0f0f11;
      color: white;
      font-size: 16px;
    }

    .input-box button {
      padding: 15px 20px;
      border-radius: 10px;
      background: #38bdf8;
      border: none;
      color: #000;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      transition: 0.2s;
    }

    .input-box button:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <!-- الشريط الجانبي -->
  <div class="sidebar">
    <h2>Kwai AI</h2>

    <button>محادثة جديدة</button>
    <button>السجل</button>
    <button>الإعدادات</button>
    <button>حول Kwai</button>
  </div>

  <!-- منطقة المحادثة -->
  <div class="chat-container">

    <div class="messages" id="messages">
      <div class="message ai">مرحباً بك في Kwai… كيف أقدر أساعدك؟</div>
    </div>

    <div class="input-box">
      <input id="input" type="text" placeholder="اكتب رسالتك هنا…">
      <button onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");

      if (input.value.trim() === "") return;

      // رسالة المستخدم
      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.textContent = input.value;
      messages.appendChild(userMsg);

      // رد الذكاء الاصطناعي (وهمي الآن)
      const aiMsg = document.createElement("div");
      aiMsg.className = "message ai";
      aiMsg.textContent = "جارٍ المعالجة… (لاحقاً نربطها بذكاء اصطناعي حقيقي)";
      messages.appendChild(aiMsg);

      messages.scrollTop = messages.scrollHeight;
      input.value = "";
    }
  </script>

</body>
</html>
